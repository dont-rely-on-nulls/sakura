<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sakura Browser Shell</title>
  <style>
    :root {
      --bg: #f4efe3;
      --panel: #fff9ed;
      --text: #2d1e0f;
      --muted: #6d5845;
      --accent: #c65d0e;
      --accent-2: #9f3a00;
      --border: #e6d4ba;
      --font-ui: "Avenir Next", "Gill Sans", "Trebuchet MS", sans-serif;
      --font-mono: "IBM Plex Mono", "Menlo", "Consolas", monospace;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--text);
      font-family: var(--font-ui);
      background:
        radial-gradient(circle at 10% 10%, #ffe4c0 0%, transparent 45%),
        radial-gradient(circle at 90% 90%, #f6d1b2 0%, transparent 35%),
        linear-gradient(140deg, #f6f0e4 0%, #f2e6d3 60%, #ead9be 100%);
      display: grid;
      place-items: center;
      padding: 24px;
    }

    main {
      width: min(900px, 100%);
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(83, 50, 21, 0.16);
      padding: 20px;
      animation: rise 280ms ease-out;
    }

    h1 {
      margin: 0;
      font-size: clamp(1.4rem, 2vw, 2rem);
      letter-spacing: 0.02em;
    }

    p {
      margin: 8px 0 18px;
      color: var(--muted);
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-size: 0.9rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--muted);
    }

    textarea {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px;
      font-family: var(--font-mono);
      font-size: 0.95rem;
      line-height: 1.4;
      color: var(--text);
      background: #fffdf8;
      transition: border-color 120ms ease;
    }

    textarea:focus {
      outline: none;
      border-color: var(--accent);
    }

    #command-input {
      min-height: 120px;
      resize: vertical;
    }

    .input-wrap {
      position: relative;
    }

    #autocomplete {
      position: absolute;
      left: 0;
      right: 0;
      top: calc(100% + 6px);
      border: 1px solid var(--border);
      border-radius: 8px;
      background: #fffdf8;
      box-shadow: 0 10px 24px rgba(83, 50, 21, 0.14);
      max-height: 180px;
      overflow: auto;
      z-index: 5;
      display: none;
    }

    .ac-item {
      padding: 8px 10px;
      font-family: var(--font-mono);
      font-size: 0.88rem;
      border-bottom: 1px solid #f0e4d1;
      cursor: pointer;
    }

    .ac-item:last-child { border-bottom: 0; }
    .ac-item.active { background: #f6e4cc; }

    #result-table {
      margin-top: 14px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: #fffdf8;
      padding: 10px;
      position: relative;
    }

    .result-table-wrap {
      overflow: auto;
      max-height: 320px;
      border-radius: 8px;
      background: #fffdf8;
    }

    #status {
      margin-top: 12px;
      color: var(--muted);
      font-size: 0.92rem;
    }

    .debug-panel {
      margin-top: 14px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: #fffdf8;
      padding: 10px;
      display: none;
    }

    .debug-panel.open {
      display: block;
    }

    #debug-log {
      margin-top: 10px;
      border: 1px dashed var(--border);
      border-radius: 8px;
      background: #fffdf8;
      padding: 8px;
      min-height: 60px;
      max-height: 140px;
      overflow: auto;
      font-family: var(--font-mono);
      font-size: 0.8rem;
      color: #5f4a37;
      white-space: pre-wrap;
    }

    .result-title {
      font-family: var(--font-ui);
      font-size: 0.9rem;
      color: var(--muted);
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    #result-table table {
      width: 100%;
      border-collapse: separate;
      border-spacing: 0;
      font-family: var(--font-mono);
      font-size: 0.9rem;
    }

    #result-table th,
    #result-table td {
      text-align: left;
      border-bottom: 1px solid var(--border);
      padding: 8px;
      vertical-align: top;
      white-space: nowrap;
    }

    #result-table th {
      color: var(--muted);
      position: sticky;
      top: 0;
      background: #fff8eb;
      z-index: 3;
      box-shadow: 0 1px 0 #e6d4ba;
      background-clip: padding-box;
    }

    #result-table thead {
      position: sticky;
      top: 0;
      z-index: 3;
      background: #fff8eb;
      box-shadow: 0 1px 0 #e6d4ba;
    }

    .actions {
      margin-top: 12px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    button {
      border: 0;
      border-radius: 999px;
      padding: 10px 18px;
      font-weight: 600;
      letter-spacing: 0.02em;
      color: #fff7eb;
      background: linear-gradient(180deg, var(--accent) 0%, var(--accent-2) 100%);
      cursor: pointer;
      transform: translateY(0);
      transition: transform 120ms ease, box-shadow 120ms ease;
      box-shadow: 0 8px 20px rgba(159, 58, 0, 0.3);
    }

    button:hover {
      transform: translateY(-1px);
      box-shadow: 0 10px 22px rgba(159, 58, 0, 0.35);
    }

    .hint {
      color: var(--muted);
      font-size: 0.88rem;
    }

    .popup-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(38, 24, 11, 0.45);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 30;
      padding: 20px;
    }

    .popup-backdrop.open { display: flex; }

    .popup-card {
      width: min(680px, 100%);
      background: #fff9ed;
      border: 1px solid #e6d4ba;
      border-radius: 14px;
      box-shadow: 0 18px 48px rgba(40, 24, 12, 0.26);
      overflow: hidden;
      animation: rise 180ms ease-out;
    }

    .popup-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 14px;
      background: linear-gradient(180deg, #f4dfc5 0%, #efd5b5 100%);
      border-bottom: 1px solid #e1c8aa;
      font-weight: 700;
    }

    .popup-body {
      padding: 14px;
      font-family: var(--font-mono);
      font-size: 0.9rem;
      color: #4a3626;
      max-height: 42vh;
      overflow: auto;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .popup-foot {
      display: flex;
      justify-content: flex-end;
      padding: 12px 14px;
      border-top: 1px solid #ecd9bf;
      background: #fff4e2;
    }

    @keyframes rise {
      from {
        opacity: 0;
        transform: translateY(12px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 640px) {
      main { padding: 16px; }
    }
  </style>
</head>
<body>
  <main>
    <h1>Sakura Browser Shell</h1>
    <p>Run commands directly in your browser-backed in-memory database.</p>

    <label for="command-input">Command</label>
    <div class="input-wrap">
      <textarea id="command-input" spellcheck="false" placeholder="Type a command..."></textarea>
      <div id="autocomplete"></div>
    </div>

    <div class="actions">
      <button id="run-command" type="button">Run command</button>
      <span class="hint">Tip: Ctrl+Enter also runs it.</span>
      <button id="toggle-debug" type="button">Show debug</button>
    </div>

    <div id="status">Ready.</div>

    <label for="result-table">Result</label>
    <div id="result-table"></div>

    <div id="debug-panel" class="debug-panel">
      <div class="result-title">Debug log</div>
      <div id="debug-log"></div>
    </div>
  </main>

  <div id="popup" class="popup-backdrop" role="dialog" aria-modal="true" aria-labelledby="popup-title">
    <div class="popup-card">
      <div class="popup-head">
        <span id="popup-title">Sakura</span>
      </div>
      <div id="popup-body" class="popup-body"></div>
      <div class="popup-foot">
        <button id="popup-ok" type="button">OK</button>
      </div>
    </div>
  </div>

  <script>
    (function () {
      const debug = document.getElementById("debug-log");
      const status = document.getElementById("status");
      const runButton = document.getElementById("run-command");
      const debugPanel = document.getElementById("debug-panel");
      const toggleDebug = document.getElementById("toggle-debug");
      const commandInput = document.getElementById("command-input");
      const autocomplete = document.getElementById("autocomplete");
      const popup = document.getElementById("popup");
      const popupTitle = document.getElementById("popup-title");
      const popupBody = document.getElementById("popup-body");
      const popupOk = document.getElementById("popup-ok");

      const completionWords = [
        "drl", "ddl", "dml", "dcl", "icl",
        "Base", "Project", "Select", "Join", "Union", "Intersect", "Difference",
        "Create", "Relation", "Domain", "Insert", "Delete", "Update",
        "sakura:relation", "sakura:domain", "sakura:attribute", "sakura:constraint",
        "sakura:on", "sakura:timing", "sakura:branch", "sakura:head",
        "less_than_natural", "less_than_or_equal_natural", "greater_than_natural",
        "greater_than_or_equal_natural", "equal_natural", "not_equal_natural",
        "plus_natural", "times_natural", "minus_natural", "divide_natural"
      ];

      let acItems = [];
      let acIndex = -1;

      function hideAutocomplete() {
        acItems = [];
        acIndex = -1;
        autocomplete.style.display = "none";
        autocomplete.innerHTML = "";
      }

      function getTokenAtCursor() {
        const text = commandInput.value;
        const cursor = commandInput.selectionStart;
        let start = cursor;
        while (start > 0 && /[A-Za-z0-9_:-]/.test(text[start - 1])) start--;
        let end = cursor;
        while (end < text.length && /[A-Za-z0-9_:-]/.test(text[end])) end++;
        return { token: text.slice(start, cursor), start, end, cursor };
      }

      function applyCompletion(word) {
        const info = getTokenAtCursor();
        const before = commandInput.value.slice(0, info.start);
        const after = commandInput.value.slice(info.end);
        commandInput.value = before + word + after;
        const newCursor = before.length + word.length;
        commandInput.selectionStart = newCursor;
        commandInput.selectionEnd = newCursor;
        hideAutocomplete();
        commandInput.focus();
      }

      function renderAutocomplete(matches) {
        if (!matches.length) {
          hideAutocomplete();
          return;
        }
        acItems = matches;
        acIndex = 0;
        autocomplete.innerHTML = matches
          .map((m, i) => `<div class="ac-item ${i === 0 ? "active" : ""}" data-index="${i}">${m}</div>`)
          .join("");
        autocomplete.style.display = "block";
      }

      function refreshActive() {
        const items = autocomplete.querySelectorAll(".ac-item");
        items.forEach((el, i) => {
          el.classList.toggle("active", i === acIndex);
        });
        if (items[acIndex]) items[acIndex].scrollIntoView({ block: "nearest" });
      }

      window.sakuraDebug = function (message) {
        const line = `[${new Date().toLocaleTimeString()}] ${message}`;
        debug.textContent += (debug.textContent ? "\n" : "") + line;
        debug.scrollTop = debug.scrollHeight;
      };

      function hidePopup() {
        popup.classList.remove("open");
      }

      window.sakuraShowPopup = function (title, message) {
        popupTitle.textContent = title || "Sakura";
        popupBody.textContent = message || "Unknown error";
        popup.classList.add("open");
      };

      popupOk.addEventListener("click", hidePopup);
      popup.addEventListener("click", function (event) {
        if (event.target === popup) hidePopup();
      });

      window.sakuraDebug("HTML loaded");
      status.textContent = "HTML ready, waiting runtime...";

      window.addEventListener("error", function (event) {
        window.sakuraDebug("window.error: " + event.message);
      });

      window.addEventListener("unhandledrejection", function (event) {
        window.sakuraDebug("unhandledrejection: " + String(event.reason));
      });

      if (typeof Object.prototype.caml_thread_initialize !== "function") {
        Object.defineProperty(Object.prototype, "caml_thread_initialize", {
          value: function () { return 0; },
          writable: true,
          configurable: true,
          enumerable: false
        });
        window.sakuraDebug("installed caml_thread_initialize polyfill");
      }

      runButton.addEventListener("click", function () {
        window.sakuraDebug("Button click captured (HTML layer)");
      });

      toggleDebug.addEventListener("click", function () {
        const open = debugPanel.classList.toggle("open");
        toggleDebug.textContent = open ? "Hide debug" : "Show debug";
      });

      commandInput.addEventListener("input", function () {
        const { token } = getTokenAtCursor();
        if (!token || token.length < 1) {
          hideAutocomplete();
          return;
        }
        const needle = token.toLowerCase();
        const matches = completionWords
          .filter((w) => w.toLowerCase().startsWith(needle))
          .slice(0, 10);
        renderAutocomplete(matches);
      });

      commandInput.addEventListener("keydown", function (event) {
        if (autocomplete.style.display === "none") return;

        if (event.key === "ArrowDown") {
          event.preventDefault();
          acIndex = (acIndex + 1) % acItems.length;
          refreshActive();
          return;
        }
        if (event.key === "ArrowUp") {
          event.preventDefault();
          acIndex = (acIndex - 1 + acItems.length) % acItems.length;
          refreshActive();
          return;
        }
        if (event.key === "Tab") {
          event.preventDefault();
          if (acItems[acIndex]) applyCompletion(acItems[acIndex]);
          return;
        }
        if (event.key === "Escape") {
          hideAutocomplete();
        }
      });

      autocomplete.addEventListener("mousedown", function (event) {
        const row = event.target.closest(".ac-item");
        if (!row) return;
        const idx = Number(row.dataset.index || "-1");
        if (idx >= 0 && acItems[idx]) applyCompletion(acItems[idx]);
      });

      document.addEventListener("click", function (event) {
        if (!autocomplete.contains(event.target) && event.target !== commandInput) {
          hideAutocomplete();
        }
      });

      const runtimePath = "../_build/default/bin/browser.bc.js";
      fetch(runtimePath, { method: "HEAD" })
        .then(function (res) {
          window.sakuraDebug("runtime HEAD " + res.status + " " + runtimePath);
        })
        .catch(function (err) {
          window.sakuraDebug("runtime HEAD failed: " + String(err));
        });

      const runtimeScript = document.createElement("script");
      runtimeScript.src = runtimePath;
      runtimeScript.onload = function () {
        window.sakuraDebug("runtime script loaded");
      };
      runtimeScript.onerror = function () {
        window.sakuraDebug("runtime script failed to load");
      };
      document.body.appendChild(runtimeScript);
    })();
  </script>
</body>
</html>
